# replicaCount is NOT exposed in values — the Deployment template hardcodes
# replicas: 1 because git lock requires a single writer.

image:
  repository: zjor/telegram-brain-bot
  tag: latest    # overridden by deploy-with-helm.sh to git short SHA

storageClass: local-path

persistence:
  brainData: 2Gi
  botDb:     100Mi
  botHome:   1Gi

# Only chart-level env vars live here. Bot-runtime config (BRAIN_REPO_URL,
# GIT_USER_NAME, GIT_USER_EMAIL, TELEGRAM_BOT_TOKEN, etc.) comes from the
# env Secret (envFrom). Putting them here too would shadow the Secret —
# k8s gives `env:` precedence over `envFrom:`.
env:
  NOTIFY_PORT: "8080"   # also templated into the exec-probe URL

secretName:
  env: telegram-brain-bot-env
  ssh: telegram-brain-bot-ssh

resources:
  requests:
    memory: 256Mi
    cpu:    100m
  limits:
    memory: 1Gi
    cpu:    1000m
