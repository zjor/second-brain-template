apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: 1   # hardcoded — git lock requires a single writer; do not override
  strategy:
    type: Recreate   # PVCs are RWO; rolling update would deadlock on volume attach
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      initContainers:
        # First-boot seed for bot-home PVC (starts empty, masks the image's
        # baked-in /home/bot/.ssh/). Re-creates:
        #   - .ssh/known_hosts via ssh-keyscan (so `git clone` doesn't prompt)
        #   - .ssh/id_ed25519 copied from the ssh-key Secret with mode 0400
        # Copy approach is needed because Secret subPath mounts ignore fsGroup,
        # so a directly subPath-mounted key is owned root:root mode 0400 and
        # unreadable by the bot user (uid 1001). Copying into the PVC at init
        # time gives us a bot-owned 0400 file that ssh accepts.
        - name: seed-home
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /home/bot/.ssh
              chmod 700 /home/bot/.ssh
              if [ ! -s /home/bot/.ssh/known_hosts ]; then
                ssh-keyscan -t ed25519 github.com >> /home/bot/.ssh/known_hosts 2>/dev/null
              fi
              cp /etc/ssh-key/id_ed25519 /home/bot/.ssh/id_ed25519
              chmod 0400 /home/bot/.ssh/id_ed25519
          volumeMounts:
            - name: bot-home
              mountPath: /home/bot
            - name: ssh-key
              mountPath: /etc/ssh-key
              readOnly: true
      containers:
        - name: {{ .Release.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          env:
            - name: COMMIT_SHA
              value: "{{ .Values.image.tag }}"
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: "{{ $value }}"
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Values.secretName.env }}
          volumeMounts:
            - name: brain-data
              mountPath: /data/brain
            - name: bot-db
              mountPath: /data/db
            - name: bot-home
              mountPath: /home/bot
            # ssh-key Secret is consumed only by the seed-home initContainer.
            # It copies the key into /home/bot/.ssh/id_ed25519 with mode 0400
            # owned by the bot user — directly subPath-mounting it here would
            # leave it root:root and unreadable.
          livenessProbe:
            exec:
              command:
                - curl
                - -fs
                - "http://127.0.0.1:{{ .Values.env.NOTIFY_PORT }}/healthz"
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 4
          readinessProbe:
            exec:
              command:
                - curl
                - -fs
                - "http://127.0.0.1:{{ .Values.env.NOTIFY_PORT }}/healthz"
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
{{ toYaml .Values.resources | indent 12 }}
      volumes:
        - name: brain-data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-brain-data
        - name: bot-db
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-bot-db
        - name: bot-home
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-bot-home
        - name: ssh-key
          secret:
            secretName: {{ .Values.secretName.ssh }}
            defaultMode: 0400
            items:
              - key: id_ed25519
                path: id_ed25519
