apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: 1   # hardcoded — git lock requires a single writer; do not override
  strategy:
    type: Recreate   # PVCs are RWO; rolling update would deadlock on volume attach
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      initContainers:
        # First-boot seed for bot-home PVC. Runs as root so it can:
        #   - read the ssh-key Secret (mounted root:root mode 0400)
        #   - write into the PVC regardless of its initial ownership
        # Finally chowns everything to the bot user (uid 1001) so the main
        # container (which runs as uid 1001 per Dockerfile USER) can use it.
        # Seeds:
        #   - /home/bot/.ssh/known_hosts via ssh-keyscan (git clone over SSH)
        #   - /home/bot/.ssh/id_ed25519 copied from the ssh-key Secret, 0400
        - name: seed-volumes
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              set -e
              # ssh setup
              mkdir -p /home/bot/.ssh /home/bot/.claude
              chmod 700 /home/bot/.ssh
              if [ ! -s /home/bot/.ssh/known_hosts ]; then
                ssh-keyscan -t ed25519 github.com >> /home/bot/.ssh/known_hosts 2>/dev/null
              fi
              cp /etc/ssh-key/id_ed25519 /home/bot/.ssh/id_ed25519
              chmod 0400 /home/bot/.ssh/id_ed25519
              # chown every PVC root so git/sqlite/claude (running as uid 1001)
              # don't trip on root-owned parent dirs (local-path-provisioner
              # creates volume roots root-owned).
              chown -R 1001:1001 /home/bot /data/brain /data/db
          volumeMounts:
            - name: bot-home
              mountPath: /home/bot
            - name: brain-data
              mountPath: /data/brain
            - name: bot-db
              mountPath: /data/db
            - name: ssh-key
              mountPath: /etc/ssh-key
              readOnly: true
      containers:
        - name: {{ .Release.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          env:
            - name: COMMIT_SHA
              value: "{{ .Values.image.tag }}"
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: "{{ $value }}"
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Values.secretName.env }}
          volumeMounts:
            - name: brain-data
              mountPath: /data/brain
            - name: bot-db
              mountPath: /data/db
            - name: bot-home
              mountPath: /home/bot
            # ssh-key Secret is consumed only by the seed-home initContainer.
            # It copies the key into /home/bot/.ssh/id_ed25519 with mode 0400
            # owned by the bot user — directly subPath-mounting it here would
            # leave it root:root and unreadable.
          livenessProbe:
            exec:
              command:
                - curl
                - -fs
                - "http://127.0.0.1:{{ .Values.env.NOTIFY_PORT }}/healthz"
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 4
          readinessProbe:
            exec:
              command:
                - curl
                - -fs
                - "http://127.0.0.1:{{ .Values.env.NOTIFY_PORT }}/healthz"
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
{{ toYaml .Values.resources | indent 12 }}
      volumes:
        - name: brain-data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-brain-data
        - name: bot-db
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-bot-db
        - name: bot-home
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-bot-home
        - name: ssh-key
          secret:
            secretName: {{ .Values.secretName.ssh }}
            defaultMode: 0400
            items:
              - key: id_ed25519
                path: id_ed25519
